name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      NEXT_PUBLIC_PAYPAL_CLIENT_ID: ci-paypal-client-id
      PAYPAL_CLIENT_SECRET: ci-paypal-client-secret
      PAYPAL_WEBHOOK_ID: ci-paypal-webhook-id
      BREVO_API_KEY: ci-brevo-api-key
      BREVO_FROM_NAME: PCOptimize
      BREVO_FROM_EMAIL: no-reply@example.com
      NEXT_PUBLIC_CAL_COM_URL: https://cal.com/pcoptimize
      CALCOM_WEBHOOK_SECRET: ci-calcom-webhook-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('bun.lock', 'package.json', 'next.config.ts', 'tsconfig.json', 'eslint.config.mjs') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

  deploy_preview:
    name: Deploy Preview (Vercel)
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    environment:
      name: preview
    env:
      NEXT_TELEMETRY_DISABLED: 1
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel secrets
        run: |
          test -n "${{ secrets.VERCEL_TOKEN }}" || { echo "Missing VERCEL_TOKEN"; exit 1; }
          test -n "${{ secrets.VERCEL_ORG_ID }}" || { echo "Missing VERCEL_ORG_ID"; exit 1; }
          test -n "${{ secrets.VERCEL_PROJECT_ID }}" || { echo "Missing VERCEL_PROJECT_ID"; exit 1; }

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pull Vercel environment (preview)
        run: bunx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel artifacts (preview)
        run: bunx vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (preview)
        id: vercel_deploy
        run: |
          url=$(bunx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$url" >> "$GITHUB_OUTPUT"

  deploy_production:
    name: Deploy Production (Vercel)
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    env:
      NEXT_TELEMETRY_DISABLED: 1
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel secrets
        run: |
          test -n "${{ secrets.VERCEL_TOKEN }}" || { echo "Missing VERCEL_TOKEN"; exit 1; }
          test -n "${{ secrets.VERCEL_ORG_ID }}" || { echo "Missing VERCEL_ORG_ID"; exit 1; }
          test -n "${{ secrets.VERCEL_PROJECT_ID }}" || { echo "Missing VERCEL_PROJECT_ID"; exit 1; }

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pull Vercel environment (production)
        run: bunx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel artifacts (production)
        run: bunx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        id: vercel_deploy
        run: |
          url=$(bunx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "production_url=$url" >> "$GITHUB_OUTPUT"
